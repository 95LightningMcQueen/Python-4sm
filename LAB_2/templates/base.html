<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Агрегатор портфолио</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        .nav { background: #333; padding: 15px; color: white; }
        .nav a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .box { background: #dfe6e9; padding: 15px; border-radius: 5px; margin: 10px; border: 1px solid #b2bec3;}
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Главная (Все портфолио)</a>
        {% if session.user %}
            <a href="/edit">Мое портфолио</a>
            <a href="/logout">Выход ({{ session.user }})</a>
        {% else %}
            <a href="/login">Авторизация</a>
            <a href="/register">Регистрация</a>
        {% endif %}
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
