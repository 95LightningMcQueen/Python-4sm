<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Музыкальный чарт</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #d49a4e;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --circle-color: linear-gradient(135deg, #c98246, #e6b981);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 15% 50%, rgba(201, 130, 70, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(179, 136, 164, 0.08), transparent 25%);
            background-attachment: fixed;
        }
        .header-container { max-width: 800px; margin: 0 auto 30px auto; text-align: center; }
        h1 { font-size: 2.5em; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,255,255,0.2); margin-bottom: 10px;}
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; margin: 5px;}
        .btn:hover { background: #b8823b; box-shadow: 0 0 15px rgba(212, 154, 78, 0.5); transform: translateY(-2px);}
        .auth-info { color: var(--text-muted); font-size: 0.9em; margin-top: 15px; }
        .auth-info a { color: var(--accent); text-decoration: none; font-weight: 600; }
        
        #chart-container { max-width: 800px; margin: 0 auto; }
        
        .track-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            margin: 20px auto; padding: 20px;
            display: flex; align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards;
        }
        .track-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .circle { min-width: 80px; height: 80px; background: var(--circle-color); border-radius: 50%; margin-right: 25px; box-shadow: 0 0 15px rgba(201, 130, 70, 0.4);}
        .info { flex-grow: 1; line-height: 1.5; }
        .info a { color: var(--text-main); text-decoration: none; font-size: 1.2em; transition: color 0.3s; }
        .info a:hover { color: var(--accent); }
        .info .artist { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px;}
        .right-side { text-align: right; line-height: 1.5; font-size: 0.9em; color: var(--text-muted);}
        .stars { color: var(--accent); font-size: 1.1em; letter-spacing: 2px; margin-top: 5px; text-shadow: 0 0 5px rgba(212, 154, 78, 0.5);}
        .rating-badge { display: inline-block; background: rgba(212, 154, 78, 0.2); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-top: 5px; font-size: 0.85em;}
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 30px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Музыкальный чарт</h1>
        {% if user.is_superuser %}
            <a href="{% url 'add_track' %}" class="btn">Добавить трек</a>
        {% endif %}
        <div class="auth-info">
            {% if not user.is_authenticated %}
                Чтобы голосовать, <a href="/admin/login/?next=/">войдите в систему</a>.
            {% else %}
                Привет, <b>{{ user.username }}</b>! <a href="/admin/logout/?next=/">Выйти</a>
            {% endif %}
        </div>
    </div>

    <div id="chart-container"></div>
    <div id="loading-spinner" class="loader"></div>

    <script>
        let page = 1; let hasNext = true; let isLoading = false;
        const container = document.getElementById('chart-container');
        const spinner = document.getElementById('loading-spinner');

function loadTracks() {
            if (isLoading || !hasNext) return;
            isLoading = true;
            spinner.style.display = 'block';

            fetch(`/?page=${page}`, { headers: {'X-Requested-With': 'XMLHttpRequest'} })
                .then(res => res.json())
                .then(data => {
                    spinner.style.display = 'none';
                    data.tracks.forEach((track, index) => {
                        const ratingNum = Math.round(track.rating);
                        const filledStars = '★'.repeat(ratingNum);
                        const emptyStars = '★'.repeat(10 - ratingNum);
                        const coverHTML = track.cover_url 
                            ? `<img src="${track.cover_url}" class="circle" style="object-fit: cover;">`
                            : `<div class="circle"></div>`;

                        const div = document.createElement('div');
                        div.className = 'track-card';
                        div.style.animationDelay = `${index * 0.1}s`;
                        div.innerHTML = `
                            ${coverHTML}
                            <div class="info">
                                <div class="artist">${track.artist}</div>
                                <a href="/track/${track.id}/"><b>${track.title}</b></a><br>
                                <span style="font-size: 0.9em; color: var(--text-muted);">${track.genre}</span><br>
                                <div class="rating-badge">Рейтинг: ${track.rating}/10</div>
                            </div>
                            <div class="right-side">
                                Год выпуска: ${track.release_year}<br>
                                Голосов: <b>${track.votes_count}</b><br>
                                <div class="stars">${filledStars}<span style="color: rgba(255,255,255,0.15);">${emptyStars}</span></div>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                    hasNext = data.has_next;
                    page++;
                    isLoading = false;
                });
        }

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 150) { loadTracks(); }
        });
        loadTracks(); 
    </script>
</body>
</html>
